{% extends 'core/base.html' %}

{% block title %}Delete {{ item.title }}{% endblock %}

{% block content %}
<div class="form-wrapper">
    <h1 class="form-header">Delete Item</h1>

    <div class="confirm-box">
        <p>Are you sure you want to delete <strong>{{ item.title }}</strong>?</p>
        <p class="confirm-warning">This action cannot be undone. All reviews for this item will also be deleted.</p>

        <form method="post">
            {% csrf_token %}
            <div class="confirm-actions">
                <button type="submit" class="btn btn-danger">Delete</button>
                <a href="{% url 'media_detail' item.id %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
